# start with: docker-compose up -d
# stop with:  docker-compose down

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cs_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped


  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cs_kafka
    depends_on:
      - zookeeper          
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # localhost:9092 is what your python code uses to connect
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      # 1 means no replication - fine for local dev
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # kafka auto creates topics when first message is sent
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cs_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: capitalsense
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    restart: unless-stopped


  prometheus:
    image: prom/prometheus:latest
    container_name: cs_prometheus
    ports:
      - "9090:9090"
    volumes:
      # tells prometheus which apps to scrape metrics from
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped


  grafana:
    image: grafana/grafana:latest
    container_name: cs_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # persists grafana data between restarts
      - grafana_data:/var/lib/grafana
      # auto configures prometheus as data source
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    restart: unless-stopped


  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: cs_otel
    ports:
      - "4317:4317"    # your app sends traces here (grpc)
      - "4318:4318"    # alternative http endpoint
      - "8888:8888"    # otel's own internal metrics
    volumes:
      - ./deploy/otel-config.yaml:/etc/otelcol-contrib/config.yaml
    restart: unless-stopped

volumes:
  # named volume so grafana data survives docker-compose down
  grafana_data: