# tells prometheus which apps to scrape metrics from and how often

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "capitalsense-gateway"
    static_configs:
      - targets: ["host.docker.internal:8001"]

  - job_name: "capitalsense-workers"
    static_configs:
      - targets: ["host.docker.internal:8002"]

  # scrapes otel collector's own metrics
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

